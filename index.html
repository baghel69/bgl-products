<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGL Products</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<style>
  body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background:#f5f5f5;}
  .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;}
  .search-bar input { padding:5px; width:200px; }
  .grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:20px;}
  .box { background:white; padding:10px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.2); position:relative;}
  .box img { width:100%; border-radius:5px; cursor:pointer;}
  .product-no { position:absolute; top:5px; left:5px; background:rgba(0,0,0,0.6); color:white; padding:2px 5px; border-radius:3px; font-size:12px;}
  .admin-btn { margin-bottom:20px; }
</style>
</head>
<body>

<div class="header">
  <div class="admin-btn">
    <button onclick="adminLogin()">Add Product</button>
  </div>
  <div class="search-bar">
    <input type="number" id="searchInput" placeholder="Search Product No." oninput="searchProduct()">
  </div>
</div>

<h3>Trending Products</h3>
<div id="trending" class="grid"></div>

<h3>Top 3 Products</h3>
<div id="top3" class="grid"></div>

<h3>Recently Added Products</h3>
<div id="recent" class="grid"></div>

<script>
// 🔹 Firebase Config – Replace with your own
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

// 🔹 Admin Password
const ADMIN_PASS = "baghel9368075162";

// 🔹 Render Products
function renderProducts(containerId, products) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  products.forEach(p => {
    const box = document.createElement('div');
    box.className = 'box';
    box.innerHTML = `
      <div class="product-no">${p.no}</div>
      <img src="${p.img}" onclick="window.open('${p.link}', '_blank')">
    `;
    container.appendChild(box);
  });
}

// 🔹 Load Products from Firestore
async function loadProducts() {
  const snapshot = await db.collection('products').get();
  const all = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
  
  // Trending: Sort by clicks
  const trending = [...all].sort((a,b)=>b.clicks-a.clicks).slice(0,6);
  renderProducts('trending', trending);
  
  // Top 3
  const top3 = [...all].sort((a,b)=>b.clicks-a.clicks).slice(0,3);
  renderProducts('top3', top3);
  
  // Recent
  const recent = [...all].sort((a,b)=>b.time-a.time).slice(0,6);
  renderProducts('recent', recent);
  
  window.allProducts = all; // store for search
}

// 🔹 Search by Product No
function searchProduct() {
  const val = Number(document.getElementById('searchInput').value);
  if(!val) return loadProducts();
  const result = window.allProducts.filter(p => p.no === val);
  renderProducts('trending', result);
  renderProducts('top3', result);
  renderProducts('recent', result);
}

// 🔹 Admin Login + Add Product
function adminLogin() {
  const pass = prompt("Enter Admin Password");
  if(pass !== ADMIN_PASS){ alert("Wrong Password"); return; }
  const no = Number(prompt("Enter Product No."));
  const link = prompt("Enter Affiliate Link (https://...)");
  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = 'image/*';
  fileInput.onchange = async e=>{
    const file = e.target.files[0];
    const storageRef = storage.ref('products/'+Date.now()+'_'+file.name);
    await storageRef.put(file);
    const url = await storageRef.getDownloadURL();
    await db.collection('products').add({
      no,
      link,
      img: url,
      clicks: 0,
      time: Date.now()
    });
    alert("Product Added!");
    loadProducts();
  };
  fileInput.click();
}

// 🔹 Initialize
loadProducts();
</script>

</body>
</html>
