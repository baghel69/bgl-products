<!DOCTYPE html>
<html>
<head>
  <title>BGL Products</title>

  <style>
    body { font-family: Arial; margin:0; background:#f5f5f5;}

    .header {
      background:black;
      color:white;
      padding:10px;
      text-align:center;
    }

    .search {
      padding:10px;
      text-align:center;
    }

    input {
      padding:10px;
      width:60%;
      border-radius:10px;
      border:1px solid #ccc;
    }

    button {
      padding:10px;
      border:none;
      background:black;
      color:white;
      border-radius:10px;
    }

    .section-title {
      padding:10px;
      font-weight:bold;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
      padding:10px;
    }

    .box {
      height:180px;
      background:#ddd;
      border-radius:10px;
      overflow:hidden;
      position:relative;
    }

    img {
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .number {
      position:absolute;
      top:5px;
      left:5px;
      background:black;
      color:white;
      padding:3px 8px;
      border-radius:5px;
      font-size:12px;
    }

    .admin-btn {
      position:fixed;
      bottom:20px;
      right:20px;
      background:black;
      color:white;
      padding:15px;
      border-radius:50%;
      font-size:20px;
    }

    .dashboard {
      background:white;
      margin:10px;
      padding:10px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<div class="header">BGL Products</div>

<div class="search">
  <input type="number" id="searchBox" placeholder="Enter Product No.">
  <button onclick="goToProduct()">Go</button>
</div>

<div class="dashboard" id="dashboard"></div>

<div id="content"></div>

<button class="admin-btn" onclick="adminLogin()">+</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let isAdmin = false;

window.adminLogin = function() {
  let pass = prompt("Enter Password");
  if(pass === "baghel123") {
    isAdmin = true;
    alert("Admin Mode ON");
  } else alert("Wrong Password");
};

const content = document.getElementById("content");
const dashboard = document.getElementById("dashboard");

let globalProducts = [];

async function loadData() {
  const querySnapshot = await getDocs(collection(db, "products"));
  globalProducts = [];

  querySnapshot.forEach(docSnap => {
    globalProducts.push({ id: docSnap.id, ...docSnap.data() });
  });

  let trending = [...globalProducts].sort((a,b)=> (b.clicks||0)-(a.clicks||0));
  let recent = [...globalProducts].sort((a,b)=> (b.time||0)-(a.time||0));
  let top3 = trending.slice(0,3);

  content.innerHTML = "";

  createSection("🏆 Top 3 Products", top3);
  createSection("🔥 Trending Products", trending);
  createSection("🆕 Recently Added", recent);

  let totalClicks = globalProducts.reduce((s,p)=>s+(p.clicks||0),0);

  dashboard.innerHTML = `
    Total Products: ${globalProducts.length} <br>
    Total Clicks: ${totalClicks}
  `;
}

function createSection(title, list) {
  let titleDiv = document.createElement("div");
  titleDiv.className = "section-title";
  titleDiv.innerText = title;
  content.appendChild(titleDiv);

  let grid = document.createElement("div");
  grid.className = "grid";

  list.forEach((data, index) => {
    let box = document.createElement("div");
    box.className = "box";

    let number = document.createElement("div");
    number.className = "number";
    number.innerText = "#" + (index+1);

    let img = document.createElement("img");
    img.src = data.img;

    box.appendChild(img);
    box.appendChild(number);

    box.onclick = async () => {
      window.open(data.link);
      await updateDoc(doc(db, "products", data.id), {
        clicks: (data.clicks||0)+1
      });
    };

    grid.appendChild(box);
  });

  content.appendChild(grid);
}

window.goToProduct = function() {
  let val = document.getElementById("searchBox").value;
  if(!val) return loadData();

  content.innerHTML = "";

  let product = globalProducts[val-1];
  if(!product) return alert("Product not found");

  createSection("🔍 Search Result", [product]);
};

window.addEventListener("dblclick", async () => {
  if(!isAdmin) return alert("Login first");

  let file = document.createElement("input");
  file.type = "file";
  file.click();

  file.onchange = async () => {
    let f = file.files[0];
    let storageRef = ref(storage, "images/"+f.name);

    await uploadBytes(storageRef, f);
    let url = await getDownloadURL(storageRef);

    let link = prompt("Enter Affiliate Link");

    await addDoc(collection(db, "products"), {
      img: url,
      link: link,
      clicks: 0,
      time: Date.now()
    });

    loadData();
  };
});

loadData();
</script>

</body>
</html>
